<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2D Raymarching Demo</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #080e18;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'JetBrains Mono', 'Courier New', monospace;
    color: #7aaabb;
  }
  canvas {
    display: block;
    cursor: crosshair;
    border: 1px solid #112233;
    border-radius: 4px;
  }
  .label {
    margin-top: 10px;
    font-size: 11px;
    letter-spacing: 0.1em;
    color: #2a4a5a;
    text-transform: uppercase;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="label">move mouse · SDF raymarching</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

// Responsive sizing
function resize() {
  const size = Math.min(window.innerWidth - 32, window.innerHeight - 60, 680);
  canvas.width  = size;
  canvas.height = size;
}
resize();
window.addEventListener('resize', () => { resize(); draw(); });

// ── Scene: a few circles as SDF obstacles ────────────────────────────────────
function getObstacles() {
  const S = canvas.width;
  return [
    { x: S * 0.22, y: S * 0.20, r: S * 0.10 },
    { x: S * 0.72, y: S * 0.18, r: S * 0.13 },
    { x: S * 0.14, y: S * 0.53, r: S * 0.09 },
    { x: S * 0.55, y: S * 0.72, r: S * 0.16 },
    { x: S * 0.26, y: S * 0.80, r: S * 0.12 },
    { x: S * 0.82, y: S * 0.62, r: S * 0.10 },
  ];
}

// SDF: distance from point to nearest obstacle surface
function sceneSDF(px, py, obstacles) {
  let d = Infinity;
  for (const o of obstacles) {
    const dist = Math.hypot(px - o.x, py - o.y) - o.r;
    if (dist < d) d = dist;
  }
  return d;
}

// Ray origin: left-center of canvas
const RAY_ORIGIN_X_RATIO = 0.50;
const RAY_ORIGIN_Y_RATIO = 0.50;

let mouseX = null, mouseY = null;

canvas.addEventListener('mousemove', e => {
  const r = canvas.getBoundingClientRect();
  mouseX = e.clientX - r.left;
  mouseY = e.clientY - r.top;
  draw();
});
canvas.addEventListener('mouseleave', () => { mouseX = null; mouseY = null; draw(); });

// Touch support
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const r = canvas.getBoundingClientRect();
  mouseX = e.touches[0].clientX - r.left;
  mouseY = e.touches[0].clientY - r.top;
  draw();
}, { passive: false });

function draw() {
  const S = canvas.width;
  const obstacles = getObstacles();

  const ox = S * RAY_ORIGIN_X_RATIO;
  const oy = S * RAY_ORIGIN_Y_RATIO;

  // Direction toward mouse, or default pointing right
  let tx = mouseX !== null ? mouseX : S * 0.75;
  let ty = mouseY !== null ? mouseY : oy;
  let dx = tx - ox, dy = ty - oy;
  const len = Math.hypot(dx, dy);
  if (len < 1) return;
  dx /= len; dy /= len;

  // ── Clear ─────────────────────────────────────────────────────────────────
  ctx.clearRect(0, 0, S, S);
  ctx.fillStyle = '#080e18';
  ctx.fillRect(0, 0, S, S);

  // Subtle grid
  ctx.strokeStyle = 'rgba(255,255,255,0.025)';
  ctx.lineWidth = 1;
  const step = S / 12;
  for (let x = 0; x < S; x += step) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, S); ctx.stroke();
  }
  for (let y = 0; y < S; y += step) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(S, y); ctx.stroke();
  }

  // ── Draw SDF obstacle circles ─────────────────────────────────────────────
  for (const o of obstacles) {
    // Filled
    ctx.beginPath();
    ctx.arc(o.x, o.y, o.r, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(10, 30, 55, 0.85)';
    ctx.fill();
    // Outline
    ctx.strokeStyle = 'rgba(40, 110, 160, 0.55)';
    ctx.lineWidth = 1.5;
    ctx.stroke();
  }

  // ── Raymarch ──────────────────────────────────────────────────────────────
  const MAX_STEPS = 14;
  const HIT_DIST  = 2.5;
  const MAX_T     = S * 1.5;

  const steps = [];
  let t = 0;
  let hit = false;

  for (let i = 0; i < MAX_STEPS; i++) {
    const px = ox + dx * t;
    const py = oy + dy * t;

    // also include distance to canvas border as a surface
    const borderDist = Math.min(px, py, S - px, S - py);
    const d = Math.min(sceneSDF(px, py, obstacles), borderDist);

    steps.push({ px, py, d, t });

    if (d <= HIT_DIST) { hit = true; break; }
    if (t + d > MAX_T) { t += d; break; }
    t += d;
  }

  // Draw step circles (largest first so smaller ones render on top)
  for (let i = steps.length - 1; i >= 0; i--) {
    const s = steps[i];
    const alpha = 0.13 + 0.07 * (i / steps.length);
    ctx.beginPath();
    ctx.arc(s.px, s.py, s.d, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(60, 170, 220, ${alpha + 0.15})`;
    ctx.lineWidth = 1.2;
    ctx.stroke();
    // Very faint fill
    ctx.fillStyle = `rgba(30, 100, 160, ${alpha * 0.35})`;
    ctx.fill();
  }

  // ── Ray line ──────────────────────────────────────────────────────────────
  const endX = ox + dx * (hit ? t : MAX_T * 0.95);
  const endY = oy + dy * (hit ? t : MAX_T * 0.95);

  // Glow pass
  ctx.beginPath();
  ctx.moveTo(ox, oy);
  ctx.lineTo(endX, endY);
  ctx.strokeStyle = 'rgba(80, 200, 255, 0.12)';
  ctx.lineWidth = 6;
  ctx.stroke();

  // Main ray
  ctx.beginPath();
  ctx.moveTo(ox, oy);
  ctx.lineTo(endX, endY);
  ctx.strokeStyle = hit ? 'rgba(255,110,90,0.85)' : 'rgba(180, 230, 255, 0.75)';
  ctx.lineWidth = 1.5;
  ctx.setLineDash([]);
  ctx.stroke();

  // Dashed extension if no hit
  if (!hit) {
    ctx.beginPath();
    ctx.moveTo(endX, endY);
    ctx.lineTo(ox + dx * MAX_T, oy + dy * MAX_T);
    ctx.strokeStyle = 'rgba(100, 160, 200, 0.18)';
    ctx.setLineDash([4, 6]);
    ctx.lineWidth = 1;
    ctx.stroke();
    ctx.setLineDash([]);
  }

  // ── Step dots ─────────────────────────────────────────────────────────────
  for (let i = 0; i < steps.length; i++) {
    const s = steps[i];
    const isLast = i === steps.length - 1 && hit;
    ctx.beginPath();
    ctx.arc(s.px, s.py, isLast ? 4 : 3, 0, Math.PI * 2);
    ctx.fillStyle = isLast ? 'rgba(255, 100, 80, 0.95)' : 'rgba(130, 210, 255, 0.9)';
    ctx.fill();
  }

  // ── Ray origin dot ────────────────────────────────────────────────────────
  ctx.beginPath();
  ctx.arc(ox, oy, 5, 0, Math.PI * 2);
  ctx.fillStyle = '#ffffff';
  ctx.fill();
  ctx.beginPath();
  ctx.arc(ox, oy, 9, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(255,255,255,0.25)';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // ── Labels ────────────────────────────────────────────────────────────────
  ctx.font = `${Math.round(S * 0.018)}px 'JetBrains Mono', monospace`;

  ctx.fillStyle = 'rgba(255,255,255,0.55)';
  ctx.fillText('origin', ox + 12, oy - 10);

  const stepStr = `${steps.length} step${steps.length !== 1 ? 's' : ''}`;
  const hitStr  = hit ? ' · HIT' : ' · miss';
  ctx.fillStyle = hit ? 'rgba(255,120,100,0.85)' : 'rgba(130,210,255,0.7)';
  ctx.fillText(stepStr + hitStr, S * 0.04, S * 0.96);
}

draw();
</script>
</body>
</html>
