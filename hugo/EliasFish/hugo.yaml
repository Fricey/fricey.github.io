baseURL: "https://elias.fish"
languageCode: "en-us"
title: "Elias Öström"
theme: hugo-profile

defaultContentLanguage: "en"

outputs:
  home:
    - "HTML"
    - "RSS"
    - "JSON"
  page:
    - "HTML"
    - "RSS"

enableRobotsTXT: true

pagination:
  pagerSize: 6

markup:
  goldmark:
    renderer:
      unsafe: true

Menus:
  main:
    - identifier: about
      name: About
      title: About
      url: /about
      weight: 2

params:
  customScripts: |
    <link rel="stylesheet" href="/css/bubbles.css">
    <script src="/js/bubbles.js"></script>
    <script src="/js/scroll.js" defer></script>
  title: "Elias Öström"
  description: "min portfolio"
  favicon: "/fav.png"

  useBootstrapCDN: false
  animate: true
  mathjax: false

  theme:
    defaultTheme: "dark"
    disableThemeToggle: true

  font:
    fontSize: 1rem
    fontWeight: 400
    lineHeight: 1.5
    textAlign: left

  # color:
  #   textColor: "#e4e6eb"
  #   secondaryTextColor: "#b0b3b8"
  #   textLinkColor: "#38bdf8"
  #   backgroundColor: "#0f172a"
  #   secondaryBackgroundColor: "#1e293b"
  #   primaryColor: "#38bdf8"
  #   secondaryColor: "#1e293b"

  # darkmode:
  #   textColor: "#e4e6eb"
  #   secondaryTextColor: "#b0b3b8"
  #   textLinkColor: "#38bdf8"
  #   backgroundColor: "#0f172a"
  #   secondaryBackgroundColor: "#1e293b"
  #   primaryColor: "#38bdf8"
  #   secondaryColor: "#1e293b"

  navbar:
    align: ms-auto
    brandName: " "
    disableSearch: true
    stickyNavBar:
      enable: true
      showOnScrollUp: true
    enableSeparator: false
    menus:
      disableAbout: false
      disableExperience: true
      disableEducation: true
      disableProjects: false
      disableAchievements: true
      disableContact: true

  hero:
    enable: true
    intro: ""
    title: "Elias Öström"
    subtitle: "Game Programmer"
    image: /assets/images/ingenting.png
    bottomImage:
      enable: true
    button:
      enable: false
    socialLinks:
      fontAwesomeIcons: []

  experience:
    enable: false

  education:
    enable: false

  achievements:
    enable: false

  projects:
    enable: true
    # title: "Projects"
    # items:
    #   - title: I Am Ambulance
    #     content: A 3D game developed at The Game Assembly in Malmö.
    #     image: /images/projects/P1.jpg
    #     badges:
    #       - "Unity"
    #       - "C#"
    #       - "3D"

  contact:
    enable: false

  footer:
    recentPosts:
      enable: false
    socialNetworks: {}
    contactLocation: "Malmö, Sweden"
    contactEmail: "[elias.ostrom@hotmail.com](mailto:elias.ostrom@hotmail.com)"

  listPages:
    disableFeaturedImage: false

  singlePages:
    socialShare: false
    readTime:
      enable: true
      content: "min read"
    scrollprogress:
      enable: true
      

  datesFormat:
    article: "Jan 2, 2006"
    articleList: "Jan 2, 2006"
    articleRecent: "Jan 2, 2006"

services:
  googleAnalytics:
    ID: 'G-X6R90TDX84'